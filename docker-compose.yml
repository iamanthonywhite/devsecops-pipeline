version: "3.9"

services:
  api:
    build: .
    container_name: devsecops-demo
    ports:
      - "8000:8000"
    environment:
      # In production these come from HashiCorp Vault.
      # For local dev, set them in a .env file (never commit .env to git).
      - DB_PASSWORD=${DB_PASSWORD:-changeme_local_only}
      - API_KEY=${API_KEY:-localdev_key}
      - DB_PATH=/app/data/users.db
    volumes:
      - app-data:/app/data
    restart: unless-stopped

volumes:
  app-data:
